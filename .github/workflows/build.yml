name: Build AOSP Recovery Image

on:
  workflow_dispatch:

env:
  DEVICE_NAME: oppo6765
  BUILD_TYPE: eng

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: device/alps/${{ env.DEVICE_NAME }}

    - name: Setup Build Environment
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 repo openjdk-11-jdk

    - name: Cache AOSP Source
      uses: actions/cache@v3
      with:
        path: aosp-source/.repo
        key: aosp-repo-${{ runner.os }}-android11-${{ hashFiles('aosp-source/.repo/local_manifests/device.xml') }}
        restore-keys: |
          aosp-repo-${{ runner.os }}-android11-

    - name: Sync AOSP Source (with cache)
      run: |
        mkdir -p aosp-source
        cd aosp-source
        if [ ! -d ".repo" ]; then
          repo init -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r48 --depth=1
          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/device.xml << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <remote name="github" fetch="https://github.com" />
          <project path="device/alps/oppo6765" name="twrpdtgen/android_device_alps_oppo6765" remote="github" revision="vnd_oppo6765-user-11-RP1A.200720.011-1629972958632-release-keys" />
        </manifest>
        EOF
        fi
        repo sync -c --no-tags --no-clone-bundle -j$(nproc) --fail-fast || repo sync -c --no-tags --no-clone-bundle -j1

    - name: Build Recovery
      run: |
        cd aosp-source
        source build/envsetup.sh
        lunch omni_${{ env.DEVICE_NAME }}-${{ env.BUILD_TYPE }}
        make -j$(nproc) recoveryimage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: recovery-${{ env.DEVICE_NAME }}
        path: aosp-source/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
